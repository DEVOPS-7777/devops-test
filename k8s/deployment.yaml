apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: devops-interview:latest
          env:
            - name: REDIS_URL
              value: redis://redis:6379
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: APP_SECRET
          ports:
            - containerPort: 3000